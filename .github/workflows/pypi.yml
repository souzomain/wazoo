name: Publish to PyPI

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: 'Release version'
        required: true

  workflow_dispatch:
    inputs:
      version:
        type: string
        description: 'Release version'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Build distribution
        run: uv build

      - name: Publish
        run: uv publish -t "${{ secrets.PYPI_TOKEN }}"
