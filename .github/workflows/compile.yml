name: Compile binaries
 
on:
  workflow_dispatch:
      version:
        type: string
        description: 'Release version (x, y, z)'
        required: true
 
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: wazoo-v${{ inputs.version }}-linux-x86_64

          # TODO: add this later
          #- os: windows-latest
          #  artifact_name: wazoo-v${{ inputs.version }}-windows-x86_64.exe
          #- os: macos-latest # runner arm64 (Apple Silicon)
          #  artifact_name: wazoo-v${{ inputs.version }}-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
 
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Uv Sync
        run: uv sync --all-groups

      - name: Install patchelf (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Nuitka compile 
        run: >
          uv run nuitka 
          --file-version=${{ inputs.version }}
          --product-name=wazoo
          --output-dir=dist
          --output-filename=${{ matrix.artifact_name }}
          --assume-yes-for-downloads
          --mode=onefile
          --lto=yes
          src/wazoo.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
